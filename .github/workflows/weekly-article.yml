name: Weekly Hocking Hills Article Generator

# Runs every Monday at 9:00 AM UTC and can also be triggered manually.
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ── Generate the article ────────────────────────────────────────────────
      - name: Generate bilingual article
        id: generate
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node .github/scripts/generate-article.mjs

      # ── Commit & push the new file to a fresh branch ───────────────────────
      - name: Commit article and push branch
        id: commit
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="articles/weekly-${DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check whether a new file was actually created (new files are untracked)
          if [ -z "$(git status --porcelain -- src/content/articles/)" ]; then
            echo "No new article was generated — nothing to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout -b "$BRANCH"
          git add src/content/articles/
          git commit -m "content: add weekly Hocking Hills article (${DATE})"
          git push origin "$BRANCH"

          echo "has_changes=true"  >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}"  >> "$GITHUB_OUTPUT"
          echo "date=${DATE}"      >> "$GITHUB_OUTPUT"

      # ── Open a pull request ─────────────────────────────────────────────────
      - name: Create pull request
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "🌳 Weekly Article: Hocking Hills (${{ steps.commit.outputs.date }})" \
            --body "$(cat <<'PREOF'
          ## Weekly Auto-Generated Article

          A new bilingual (English + Spanish) article about Hocking Hills has been generated and is ready for your review.

          ### Review checklist

          - [ ] Article topic is unique — not a duplicate of existing content
          - [ ] English content is accurate, well-written, and family-friendly
          - [ ] Spanish translation reads naturally (not a literal word-for-word translation)
          - [ ] Tags are relevant and appropriate
          - [ ] No sensitive, incorrect, or outdated information

          ### Publishing

          Merge this PR to publish the article on the website. The deploy workflow will build and push the updated site automatically.

          > **Note:** This PR was created automatically by the weekly article workflow. Please review carefully before merging.
          PREOF
          )" \
            --base main \
            --head "${{ steps.commit.outputs.branch }}"
